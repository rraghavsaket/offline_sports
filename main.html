<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline Sports Dhanbad - Coming Soon</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(
            135deg,
            #f8f4ff 0%,
            #efe7ff 25%,
            #e6d9ff 50%,
            #d9c2ff 75%,
            #ccb0ff 100%
        );
        overflow: hidden;
    }

    .container {
        max-width: 1200px;
        padding: 30px;
    }

    .logo {
        width: min(900px, 85vw);
        height: auto;
        display: block;
        margin: 0 auto 40px;
        filter: drop-shadow(0 15px 35px rgba(0,0,0,0.12));
    }

    .message {
        font-size: clamp(1.2rem, 2vw, 2rem);
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #3f2a68;
        line-height: 1.5;
        text-shadow: 0 2px 10px rgba(255,255,255,0.6);
    }

    .highlight {
        color: #5b21b6;
    }
</style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Offline Sports Dhanbad" class="logo">

        <div class="message">
    DHANBAD'S MOST HAPPENING<br>
    <span>SPORTING DESTINATION</span><br>

    <span style="
        display:inline-block;
        margin-top:20px;
        font-size:4rem;
        font-weight:900;
        color:white;
        background:#5b21b6;
        padding:12px 30px;
        border-radius:12px;
        letter-spacing:5px;
    ">
        COMING SOON
    </span>
</div>
    </div>

</body>
</html>
